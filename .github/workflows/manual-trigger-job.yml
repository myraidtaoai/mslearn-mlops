name: Manually trigger an Azure Machine Learning job

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  train:
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_WORKSPACE_NAME: ${{ vars.AZURE_WORKSPACE_NAME }}
    steps:
    - name: Check out repo
      uses: actions/checkout@v6
    - name: Install az ml extension
      run: az extension add -n ml -y
    - name: Azure login
      uses: azure/login@v3
      with:
        creds: ${{secrets.AZURE_CREDENTIALS}}
    - name: Run Azure Machine Learning training job
      run: az ml job create -f src/job.yml --stream --resource-group "${AZURE_RESOURCE_GROUP}" --workspace-name "${AZURE_WORKSPACE_NAME}"